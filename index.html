<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <title>Library</title>
</head>
<body>
    <div class="master-container">
        <button class="openbtn" onclick="toggleNav()">☰</button>
        <div class="sidebar">
            <h1>Add to your collection:</h1>
            <button class="addbtn" command="show-modal" commandfor="my-dialog">Add book</button>
        </div>
        <dialog id="my-dialog">
            <div class="my-dialog-wrapper">
                <div class="my-dialog-header">
                    <p>Add a book<p>
                    <p>"There is no friend as loyal as a book</p>
                </div>
                <form id="my-form" method="dialog">
                    <div class="my-form-left">
                        <div class="my-form-item">
                            <label for="title">Title</label>
                            <input type="text" id="title" name="title" placeholder="e.g. Atomic Habits">
                        </div>
                        <div class="my-form-item">
                            <label for="author">Author</label>
                            <input type="text" id="author" name="author" placeholder="e.g. James Clear">
                        </div>

                    </div>
                    <div class="my-form-right">
                        <div class="my-form-item">
                            <label for="pages">Pages</label>
                            <input type="number" id="pages" name="pages" placeholder="e.g. 367">
                        </div>
                        <div class="my-form-item-checkbox">
                            <input type="checkbox" id="read" name="read" value="unchecked">
                            <label for="read">Is read</label>
                        </div>
                    </div>
                </form>
                <div class="my-dialog-button-section">
                    <button type="submit" form="my-form">Submit</button>
                    <button commandfor="my-dialog" command="close">Cancel</button>
                </div>
            </div>
        </dialog>
        <div class="books">
            <h2>Main Website Content</h2>
        </div>
    </div>
    <script src="./library.js"></script>
</body>
</html>
