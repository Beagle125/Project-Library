<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <title>Library</title>
</head>
<body>
    <div class="master-container">
        <div class="side-panel">
            <div class="side-panel-header">
                <img alt="logo" src="./static/material-symbols--book-5-outline-rounded.svg">
                <p>Book Beagle</p>
            </div>
            <button class="addbtn" command="show-modal" commandfor="my-dialog">+New Book</button>
            <div class="side-panel-stats-container">
                <div class="side-panel-stats-item">
                    <span class="stat-book">0</span>
                    <span class="stat-name">Books</span>
                </div>
                <div class="side-panel-stats-item">
                    <span class="stat-read">0</span>
                    <span class="stat-name">Read</span>
                </div>
                <div class="side-panel-stats-item">
                    <span class="stat-unread">0</span>
                    <span class="stat-name">Unread</span>
                </div>
            </div>
        </div>
        <dialog id="my-dialog">
            <div class="my-dialog-wrapper">
                <div class="my-dialog-header">
                    <p>Add a book<p>
                    <p>"There is no friend as loyal as a book"</p>
                </div>
                <form id="my-form" method="dialog">
                    <div class="my-form-left">
                        <div class="my-form-item">
                            <label for="title">Title</label>
                            <input autocomplete="off" type="text" id="title" name="title" placeholder="e.g. Atomic Habits" required>
                        </div>
                        <div class="my-form-item">
                            <label for="author">Author</label>
                            <input autocomplete="off" type="text" id="author" name="author" placeholder="e.g. James Clear" required>
                        </div>

                    </div>
                    <div class="my-form-right">
                        <div class="my-form-item">
                            <label for="pages">Pages</label>
                            <input type="number" id="pages" name="pages" placeholder="e.g. 367" required>
                        </div>
                        <div class="my-form-item-checkbox">
                            <input type="checkbox" id="read" name="read" value="false">
                            <label for="read">Is read</label>
                        </div>
                    </div>
                </form>
                <div class="my-dialog-button-section">
                    <button class="submitbtn" type="submit" form="my-form">Submit</button>
                    <button class="cancelbtn" commandfor="my-dialog" command="close">Cancel</button>
                </div>
            </div>
        </dialog>
        <div class="books">
            
        </div>
    </div>
    <script src="./library.js"></script>
</body>
</html>
